services:
  secure-share-server:
    build: .
    container_name: secure-share-server
    restart: unless-stopped
    environment:
      SECURE_SHARE_HOST: 0.0.0.0
      SECURE_SHARE_PORT: "8000"
      SECURE_SHARE_DATA_DIR: /data
      SECURE_SHARE_MAX_REQUEST_MB: ${SECURE_SHARE_MAX_REQUEST_MB:-100}
    ports:
      - "${SECURE_SHARE_PUBLIC_PORT:-8000}:8000"
    volumes:
      - secure-share-data:/data

volumes:
  secure-share-data:
